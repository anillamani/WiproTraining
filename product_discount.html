<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Discount Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="product_discount.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Product Discount Calculator</h1>
        <form id="productForm" class="row g-3">
            <div class="col-md-6">
                <label for="productName" class="form-label">Product Name</label>
                <input type="text" class="form-control" id="productName" required>
            </div>
            <div class="col-md-6">
                <label for="productPrice" class="form-label">Product Price</label>
                <input type="number" class="form-control" id="productPrice" min="0" step="0.01" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Calculate Discount</button>
            </div>
        </form>
        <div id="result" class="mt-4"></div>
    </div>
    <script src="product_discount.js"></script>
</body>
</html>
